<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>oii, vidaa 💗</title>
  <style>
    :root {
      --purple-dark:  #4a0080;
      --purple-mid:   #7b2ff7;
      --purple-light: #9b1fe8;
      --red:          #ff3d6b;
      --red-dark:     #c1121f;
      --white:        #ffffff;
      --white-soft:   rgba(255,255,255,0.85);
      --white-muted:  rgba(255,255,255,0.4);
      --card-bg:      rgba(0,0,0,0.25);
      --card-border:  rgba(255,255,255,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: linear-gradient(160deg, var(--purple-mid) 0%, var(--purple-light) 45%, var(--purple-dark) 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--white);
      position: relative;
    }

    /* ── Corações animados ── */
    .hearts-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 20px;
      animation: floatUp linear infinite;
      user-select: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-10deg); opacity: 0.8; }
      50%  { opacity: 0.5; }
      100% { transform: translateY(-110vh) rotate(10deg); opacity: 0; }
    }

    /* ── Progress dots ── */
    .progress {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--white-muted);
      transition: all 0.3s ease;
    }
    .dot.active {
      width: 24px;
      border-radius: 4px;
      background: var(--white);
      box-shadow: 0 0 8px var(--white);
    }

    /* ── Etapas (steps) ── */
    .step {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .step.active {
      opacity: 1;
      pointer-events: all;
    }
    .step-inner {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ── Tipografia ── */
    .greeting {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .question {
      font-size: 18px;
      text-align: center;
      color: var(--white-soft);
      line-height: 1.6;
    }
    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--white-muted);
      align-self: flex-start;
    }

    /* ── Botões principais ── */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: var(--white);
      border: none;
      border-radius: 50px;
      padding: 16px 24px;
      font-size: 17px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(255,61,107,0.45);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      background: transparent;
      color: var(--white-soft);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      padding: 14px 24px;
      font-size: 15px;
      cursor: pointer;
      transition: border-color 0.2s;
      width: 100%;
    }
    .btn-secondary:hover { border-color: var(--white-muted); }

    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .btn-row .btn-secondary { flex: 1; }
    .btn-row .btn-primary   { flex: 2; }

    /* ── Pickers ── */
    .picker-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    .picker-label {
      font-size: 13px;
      color: var(--white-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .picker-input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 17px;
      color: var(--white);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    .picker-input:focus {
      border-color: rgba(255,255,255,0.4);
    }
    /* iOS date/time picker color fix */
    ::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; }

    /* ── Cards de seleção (multi e single) ── */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }
    .sel-card {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 16px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      text-align: center;
    }
    .sel-card:active { transform: scale(0.96); }
    .sel-card.selected {
      border-color: var(--red);
      background: rgba(255,61,107,0.15);
      box-shadow: 0 0 12px rgba(255,61,107,0.25);
    }
    .sel-card .card-emoji { font-size: 26px; }
    .sel-card .card-label { font-size: 12px; color: var(--white-soft); line-height: 1.3; }

    /* Card que ocupa 2 colunas */
    .sel-card.full-width { grid-column: 1 / -1; flex-direction: row; gap: 12px; padding: 14px 18px; }
    .sel-card.full-width .card-label { font-size: 14px; }
  </style>
</head>
<body>

  <!-- Corações animados -->
  <div class="hearts-container" id="heartsContainer"></div>

  <!-- ── ETAPA 1 ── -->
  <div class="step active" id="step1">
    <div class="step-inner">
      <div class="progress">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div style="font-size:56px; filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));">🏎️</div>

      <div class="greeting">oii, vidaa 💗</div>

      <div class="question">você aceita ir a um date comigo?</div>

      <div style="display:flex; flex-direction:column; gap:12px; width:100%; margin-top:8px;">
        <button class="btn-primary" onclick="goTo(2)">SIM, CLARO! ❤️‍🔥</button>
        <button class="btn-secondary" id="btnNao">Não</button>
      </div>
    </div>
  </div>

  <!-- ── ETAPA 2 ── -->
  <div class="step" id="step2">
    <div class="step-inner">
      <div class="progress">
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div style="font-size:48px;">📅</div>
      <div class="greeting" style="font-size:22px;">quando você tá livre?</div>

      <div class="picker-group">
        <span class="picker-label">Data</span>
        <input class="picker-input" type="date" id="inputDate"
               onchange="state.date = this.value">
      </div>

      <div class="picker-group">
        <span class="picker-label">Horário</span>
        <input class="picker-input" type="time" id="inputTime"
               onchange="state.time = this.value">
      </div>

      <div class="btn-row" style="margin-top:8px;">
        <button class="btn-secondary" onclick="goTo(1)">← Voltar</button>
        <button class="btn-primary"   onclick="advanceStep2()">Próximo →</button>
      </div>
    </div>
  </div>

  <!-- ── ETAPA 3 ── -->
  <div class="step" id="step3">
    <div class="step-inner" style="gap:16px;">
      <div class="progress">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div style="font-size:42px;">🍽️</div>
      <div class="greeting" style="font-size:20px;">o que tá afim?</div>
      <p style="font-size:13px; color:var(--white-muted);">pode escolher mais de um</p>

      <div class="cards-grid" id="foodGrid">
        <div class="sel-card" data-value="Hambúrguer" onclick="toggleFood(this)">
          <span class="card-emoji">🍔</span>
          <span class="card-label">Hambúrguer</span>
        </div>
        <div class="sel-card" data-value="Sushi" onclick="toggleFood(this)">
          <span class="card-emoji">🍣</span>
          <span class="card-label">Sushi</span>
        </div>
        <div class="sel-card" data-value="Pizza" onclick="toggleFood(this)">
          <span class="card-emoji">🍕</span>
          <span class="card-label">Pizza</span>
        </div>
        <div class="sel-card" data-value="Massa" onclick="toggleFood(this)">
          <span class="card-emoji">🍝</span>
          <span class="card-label">Massa</span>
        </div>
        <div class="sel-card" data-value="Churrasco" onclick="toggleFood(this)">
          <span class="card-emoji">🥩</span>
          <span class="card-label">Churrasco</span>
        </div>
        <div class="sel-card" data-value="Mexicano" onclick="toggleFood(this)">
          <span class="card-emoji">🌮</span>
          <span class="card-label">Mexicano</span>
        </div>
        <div class="sel-card" data-value="Japonês" onclick="toggleFood(this)">
          <span class="card-emoji">🍜</span>
          <span class="card-label">Japonês</span>
        </div>
        <div class="sel-card full-width" data-value="Encher o cu de cachaça" onclick="toggleFood(this)">
          <span class="card-emoji">🥃</span>
          <span class="card-label">Encher o cu de cachaça</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-secondary" onclick="goTo(2)">← Voltar</button>
        <button class="btn-primary"   onclick="advanceStep3()">Próximo →</button>
      </div>
    </div>
  </div>

  <script>
    // ── Estado global ──
    const state = {
      date: '',
      time: '',
      foods: [],
      vibe: '',
      vibeCustom: ''
    };

    // ── Gera corações flutuantes ──
    (function initHearts() {
      const container = document.getElementById('heartsContainer');
      const types = ['❤️','🖤','❤️','❤️','🖤','❤️','🖤','❤️','❤️','🖤'];
      const count = 14;
      for (let i = 0; i < count; i++) {
        const h = document.createElement('div');
        h.className = 'heart';
        h.textContent = types[i % types.length];
        h.style.left          = (Math.random() * 95) + '%';
        h.style.fontSize      = (14 + Math.random() * 14) + 'px';
        h.style.animationDuration = (4 + Math.random() * 4) + 's';
        h.style.animationDelay    = '-' + (Math.random() * 6) + 's';
        container.appendChild(h);
      }
    })();

    // ── Navegação entre etapas ──
    let currentStep = 1;

    function goTo(n) {
      const btnNao = document.getElementById('btnNao');
      if (btnNao) {
        btnNao.style.position = '';
        btnNao.style.left     = '';
        btnNao.style.top      = '';
        btnNao.style.width    = '';
        btnNao.style.zIndex   = '';
      }
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === n - 1);
      });
      document.getElementById('step' + n).classList.add('active');
      currentStep = n;
      if (n === 3) {
        document.querySelectorAll('#foodGrid .sel-card').forEach(function(card) {
          card.classList.toggle('selected', state.foods.includes(card.dataset.value));
        });
      }
    }

    // ── Botão "Não" que foge ──
    (function initBtnNao() {
      const btn = document.getElementById('btnNao');

      // Desktop: foge do cursor
      btn.addEventListener('mousemove', function(e) {
        const rect = btn.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top  + rect.height / 2;
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 80) {
          const angle = Math.atan2(dy, dx);
          const flee  = 120;
          const nx = cx - Math.cos(angle) * flee;
          const ny = cy - Math.sin(angle) * flee;
          const clampX = Math.max(0, Math.min(window.innerWidth  - rect.width,  nx - rect.width/2));
          const clampY = Math.max(0, Math.min(window.innerHeight - rect.height, ny - rect.height/2));
          btn.style.position = 'fixed';
          btn.style.left = clampX + 'px';
          btn.style.top  = clampY + 'px';
          btn.style.width = rect.width + 'px';
          btn.style.zIndex = '10';
        }
      });

      // Mobile: se move no touchstart antes do toque completar
      btn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const rect = btn.getBoundingClientRect();
        const randX = Math.max(0, Math.min(vw - rect.width,  Math.random() * vw));
        const randY = Math.max(0, Math.min(vh - rect.height, Math.random() * vh));
        btn.style.position = 'fixed';
        btn.style.left = randX + 'px';
        btn.style.top  = randY + 'px';
        btn.style.width = rect.width + 'px';
        btn.style.zIndex = '10';
      }, { passive: false });
    })();

    // ── Validação Etapa 2 ──
    function advanceStep2() {
      const d = document.getElementById('inputDate').value;
      const t = document.getElementById('inputTime').value;
      if (!d || !t) {
        alert('Escolhe a data e o horário 💗');
        return;
      }
      state.date = d;
      state.time = t;
      goTo(3);
    }

    // ── Seleção de Comida (Etapa 3) ──
    function toggleFood(card) {
      const value = card.dataset.value;
      card.classList.toggle('selected');
      if (card.classList.contains('selected')) {
        state.foods.push(value);
      } else {
        state.foods = state.foods.filter(f => f !== value);
      }
    }

    function advanceStep3() {
      if (state.foods.length === 0) {
        alert('Escolhe pelo menos uma opção 💗');
        return;
      }
      goTo(4);
    }
  </script>
</body>
</html>
