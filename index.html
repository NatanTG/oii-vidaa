<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>oii, vidaa 💗</title>
  <style>
    :root {
      --purple-dark:  #4a0080;
      --purple-mid:   #7b2ff7;
      --purple-light: #9b1fe8;
      --red:          #ff3d6b;
      --red-dark:     #c1121f;
      --white:        #ffffff;
      --white-soft:   rgba(255,255,255,0.85);
      --white-muted:  rgba(255,255,255,0.4);
      --card-bg:      rgba(0,0,0,0.25);
      --card-border:  rgba(255,255,255,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: linear-gradient(160deg, var(--purple-mid) 0%, var(--purple-light) 45%, var(--purple-dark) 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--white);
      position: relative;
    }

    /* ── Corações animados ── */
    .hearts-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 20px;
      animation: floatUp linear infinite;
      user-select: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-10deg); opacity: 0.8; }
      50%  { opacity: 0.5; }
      100% { transform: translateY(-110vh) rotate(10deg); opacity: 0; }
    }

    /* ── Progress dots ── */
    .progress {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--white-muted);
      transition: all 0.3s ease;
    }
    .dot.active {
      width: 24px;
      border-radius: 4px;
      background: var(--white);
      box-shadow: 0 0 8px var(--white);
    }

    /* ── Etapas (steps) ── */
    .step {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .step.active {
      opacity: 1;
      pointer-events: all;
    }
    .step-inner {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ── Tipografia ── */
    .greeting {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .question {
      font-size: 18px;
      text-align: center;
      color: var(--white-soft);
      line-height: 1.6;
    }
    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--white-muted);
      align-self: flex-start;
    }

    /* ── Botões principais ── */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: var(--white);
      border: none;
      border-radius: 50px;
      padding: 16px 24px;
      font-size: 17px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(255,61,107,0.45);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      background: transparent;
      color: var(--white-soft);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      padding: 14px 24px;
      font-size: 15px;
      cursor: pointer;
      transition: border-color 0.2s;
      width: 100%;
    }
    .btn-secondary:hover { border-color: var(--white-muted); }

    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .btn-row .btn-secondary { flex: 1; }
    .btn-row .btn-primary   { flex: 2; }
  </style>
</head>
<body>

  <!-- Corações animados -->
  <div class="hearts-container" id="heartsContainer"></div>

  <!-- Etapas serão inseridas nas próximas tasks -->

  <script>
    // ── Estado global ──
    const state = {
      date: '',
      time: '',
      foods: [],
      vibe: '',
      vibeCustom: ''
    };

    // ── Gera corações flutuantes ──
    (function initHearts() {
      const container = document.getElementById('heartsContainer');
      const types = ['❤️','🖤','❤️','❤️','🖤','❤️','🖤','❤️','❤️','🖤'];
      const count = 14;
      for (let i = 0; i < count; i++) {
        const h = document.createElement('div');
        h.className = 'heart';
        h.textContent = types[i % types.length];
        h.style.left          = (Math.random() * 95) + '%';
        h.style.fontSize      = (14 + Math.random() * 14) + 'px';
        h.style.animationDuration = (4 + Math.random() * 4) + 's';
        h.style.animationDelay    = '-' + (Math.random() * 6) + 's';
        container.appendChild(h);
      }
    })();

    // ── Navegação entre etapas ──
    let currentStep = 1;

    function goTo(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === n - 1);
      });
      document.getElementById('step' + n).classList.add('active');
      currentStep = n;
    }
  </script>
</body>
</html>
